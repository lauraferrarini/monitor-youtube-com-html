<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Lançamentos</title>
    <style>
        :root {
            --primary-color: #d8df00;
            --text-main: #1a1a1a;
            --text-muted: #666;
            --bg-body: #f4f4f4;
            --white: #ffffff;
            --border-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            font-size: 11px;
            background-color: var(--bg-body);
            margin: 0;
            padding: 30px;
            color: var(--text-main);
            overflow-x: auto; 
        }

        .container {
            width: max-content; 
            min-width: 100%;
            margin: 0 auto;
            background: var(--white);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header h1 { font-size: 22px; margin: 0 0 10px 0; font-weight: 700; text-transform: capitalize; }

        .period-selector { font-size: 12px; margin-bottom: 15px; }
        .period-selector span { margin-right: 15px; color: var(--text-muted); cursor: pointer; }
        .period-selector .current { color: #000; font-weight: 800; }

        nav {
            background-color: #f9f9f9; padding: 10px 15px; border-radius: 4px;
            display: inline-block; border: 1px solid var(--border-light);
        }
        .nav-btn { color: var(--text-muted); margin: 0 8px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-btn:hover { color: #000; }
        .nav-btn.active { color: #000; font-weight: 800; text-decoration: underline; }

        /* TABELA */
        table { width: 100%; border-collapse: collapse; table-layout: auto; margin-top: 20px; }
        
        th {
            color: #888; font-weight: 600; text-transform: uppercase;
            font-size: 10px; letter-spacing: 0.5px; text-align: center;
            padding: 12px 10px; border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        td { padding: 10px 8px; border-bottom: 1px solid var(--border-light); text-align: center; white-space: nowrap; vertical-align: middle; }
        tr:hover { background-color: #fafafa; }

        /* AJUSTE DE LARGURA DE COLUNAS */
        .col-regiao {
            width: 50px !important;
            min-width: 50px !important;
            max-width: 50px !important;
            text-align: center;
        }
        .col-emalta {
            width: 65px !important;
            min-width: 65px !important;
            max-width: 65px !important;
            text-align: center;
        }

        /* BADGES */
        .badge-alta { background: #ff4d4d; color: #fff; padding: 3px 6px; border-radius: 3px; font-weight: 700; font-size: 9px; }
        .region-badge { background: #eee; padding: 3px 6px; border-radius: 3px; font-weight: 600; font-size: 10px; color: #333; }

        .yt-url { color: #0000EE; text-decoration: none; }

        /* TÍTULO RETRÁTIL */
        .title-cell {
            max-width: 250px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left !important;
            cursor: pointer;
            font-weight: 600;
        }
        .title-cell.expanded {
            white-space: normal;
            word-wrap: break-word;
            overflow: visible;
        }

        /* DESCRIÇÃO RETRÁTIL */
        .desc-cell {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left !important;
            cursor: pointer;
            color: var(--text-muted);
            font-style: italic;
        }
        .desc-cell.expanded {
            white-space: pre-wrap;
            max-width: 450px;
            overflow: visible;
            word-wrap: break-word;
            background: #fafafa;
            border-radius: 4px;
            padding: 8px;
            border: 1px dashed #ccc;
        }

        /* SEGURANÇA ANTICÓPIA: Força seleção apenas no Título e Link */
        table, th, td, select, span, .region-badge, .badge-alta {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .selectable-text, .selectable-text * {
            user-select: text !important;
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
        }

    </style>
</head>
<body>

<div class="container">
    
    <header>
        <h1>Lançamentos</h1>
        <div class="period-selector" id="month-container">
            </div>
    </header>

    <nav>
        <span class="nav-btn active" onclick="switchTab('Brasil', this)">Brasil</span> |
        <span class="nav-btn" onclick="switchTab('Latam', this)">Latam</span>
    </nav>

    <div id="view-lancamentos">
        <table id="table-lancamentos">
            <thead>
                <tr>
                    <th class="col-regiao">Região</th>
                    <th class="col-emalta">Em Alta?</th>
                    <th>Título</th>
                    <th>Link do YouTube</th>
                    <th>Canal</th>
                    <th>Descrição</th>
                    <th style="width: 100px;">Data</th>
                </tr>
            </thead>
            <tbody id="tbody-videos">
                <tr>
                    <td colspan="7" style="padding: 40px; color: var(--text-muted);">Carregando dados...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    let db = []; // Banco de dados carregado dinamicamente
    let currentTab = 'Brasil';
    
    // Tradutores de data
    const numeroParaMes = {
        "01": "Janeiro", "02": "Fevereiro", "03": "Março", "04": "Abril",
        "05": "Maio", "06": "Junho", "07": "Julho", "08": "Agosto",
        "09": "Setembro", "10": "Outubro", "11": "Novembro", "12": "Dezembro"
    };
    const mesParaNumero = {
        "Janeiro": "01", "Fevereiro": "02", "Março": "03", "Abril": "04",
        "Maio": "05", "Junho": "06", "Julho": "07", "Agosto": "08",
        "Setembro": "09", "Outubro": "10", "Novembro": "11", "Dezembro": "12"
    };

    // Controle de Filtro Dinâmico
    let anoAtual = "";
    let mesAtual = "";

    // Altera a aba ativa
    function switchTab(tab, element) {
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        currentTab = tab;
        filterAndRender();
    }

    // Altera o mês pelo cabeçalho
    function mudarMes(mes, element) {
        mesAtual = mes;
        renderFiltersUI();
        filterAndRender();
    }

    // Altera o ano selecionado
    function mudarFiltroData() {
        anoAtual = document.getElementById("ano-select").value;
        renderFiltersUI();
        filterAndRender();
    }

    // Cria os seletores de Ano e Mês dinamicamente a partir dos dados existentes
    function renderFiltersUI() {
        const container = document.getElementById("month-container");
        if (!container || db.length === 0) return;

        // Extrai anos únicos presentes no histórico
        const anosPresentes = [...new Set(db.map(item => item.data ? item.data.split('-')[0] : null).filter(Boolean))];
        anosPresentes.sort((a, b) => b - a); // Mais recente primeiro

        if (anosPresentes.length === 0) return;

        // Se o ano atual não está mais disponível na lista, seleciona o mais recente
        if (!anoAtual || !anosPresentes.includes(anoAtual)) {
            anoAtual = anosPresentes[0];
        }

        // Extrai meses únicos existentes para o ano atualmente selecionado
        const mesesDoAno = [...new Set(db
            .filter(item => item.data && item.data.startsWith(anoAtual))
            .map(item => item.data.split('-')[1])
            .filter(Boolean)
        )];
        mesesDoAno.sort((a, b) => parseInt(a) - parseInt(b)); // Janeiro a Dezembro

        const mesesNomes = mesesDoAno.map(num => numeroParaMes[num]);

        // Se o mês selecionado não existir para este ano, seleciona o último disponível do ano
        if (!mesAtual || !mesesNomes.includes(mesAtual)) {
            mesAtual = mesesNomes[mesesNomes.length - 1] || "Janeiro";
        }

        // Constrói o HTML dinâmico
        let html = `<select id="ano-select" onchange="mudarFiltroData()" style="margin-right: 15px; border: 1px solid #ddd; border-radius: 4px; padding: 4px; font-family: inherit; font-size: 11px; cursor: pointer; outline: none;">`;
        anosPresentes.forEach(ano => {
            html += `<option value="${ano}" ${ano === anoAtual ? "selected" : ""}>${ano}</option>`;
        });
        html += `</select>`;

        mesesNomes.forEach(mes => {
            const isCurrent = mes === mesAtual ? 'class="current"' : '';
            html += `<span ${isCurrent} onclick="mudarMes('${mes}', this)">${mes}</span> `;
        });

        container.innerHTML = html;
    }

    // Carrega o histórico dinamicamente do servidor do GitHub
    async function carregarDados() {
        try {
            const response = await fetch('history.json');
            if (!response.ok) throw new Error('Não foi possível carregar o history.json.');
            
            const rawData = await response.json();
            
            // Converte o objeto do JSON estruturado para uma array
            db = Object.keys(rawData).map(id => ({
                id: id,
                ...rawData[id]
            }));

            if (db.length > 0) {
                // Descobre a última data registrada no histórico para abrir nela por padrão
                db.sort((a, b) => b.data.localeCompare(a.data));
                const maisRecente = db[0].data.split('-');
                anoAtual = maisRecente[0];
                mesAtual = numeroParaMes[maisRecente[1]];
            }

            renderFiltersUI();
            filterAndRender();
        } catch (error) {
            console.error(error);
            document.getElementById('tbody-videos').innerHTML = `
                <tr>
                    <td colspan="7" style="padding: 40px; color: #c0392b; font-weight: bold;">
                        Erro ao carregar banco de dados (history.json). Certifique-se de que o arquivo existe e já rodou pelo menos uma vez.
                    </td>
                </tr>`;
        }
    }

    // Filtra e desenha os dados na tela
    function filterAndRender() {
        if (db.length === 0) return;

        const prefixoData = `${anoAtual}-${mesParaNumero[mesAtual]}`;
        
        // Define quais códigos de região pertencem a cada aba
        const regioesPermitidas = currentTab === 'Brasil' 
            ? ['US', 'FR', 'NL', 'DE', 'IT', 'PT', 'BR'] 
            : ['AR', 'CL', 'CO', 'ES', 'MX', 'PE'];

        // Aplica os filtros de Data e Região
        const filtrados = db.filter(item => {
            const mesmaData = item.data && item.data.startsWith(prefixoData);
            const mesmaRegiao = item.regiao && regioesPermitidas.includes(item.regiao);
            return mesmaData && mesmaRegiao;
        });

        // ORDENAÇÃO: 1. Por Região (Alfabético) | 2. Por Posição (Rank 1 a 10 primeiro, depois os sem rank)
        filtrados.sort((a, b) => {
            const compRegiao = a.regiao.localeCompare(b.regiao);
            if (compRegiao !== 0) return compRegiao;

            const rankA = a.rank || 999;
            const rankB = b.rank || 999;
            if (rankA !== rankB) return rankA - rankB;

            // Critério de desempate: Data (Mais recente primeiro)
            return b.data.localeCompare(a.data);
        });

        const tbody = document.getElementById('tbody-videos');
        if (filtrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="padding: 40px; color: var(--text-muted);">Nenhum lançamento registrado para esta seleção neste período.</td></tr>`;
            return;
        }

        // Renderiza as linhas da tabela
        tbody.innerHTML = filtrados.map(item => {
            const emAltaBadge = (item.rank && item.rank <= 10) 
                ? `<span class="badge-alta">#${item.rank}</span>` 
                : '-';

            return `
                <tr>
                    <td class="col-regiao"><span class="region-badge">${item.regiao}</span></td>
                    <td class="col-emalta">${emAltaBadge}</td>
                    <td class="title-cell selectable-text" onclick="this.classList.toggle('expanded')">
                        ${item.titulo}
                    </td>
                    <td class="selectable-text">
                        <a class="yt-url" href="${item.link}" target="_blank">${item.link}</a>
                    </td>
                    <td>${item.canal}</td>
                    <td class="desc-cell" onclick="this.classList.toggle('expanded')">
                        ${item.descricao ? item.descricao : 'Sem descrição.'}
                    </td>
                    <td style="color: var(--text-muted);">${item.data}</td>
                </tr>
            `;
        }).join('');
    }

    // Inicialização
    carregarDados();
</script>
</body>
</html>
